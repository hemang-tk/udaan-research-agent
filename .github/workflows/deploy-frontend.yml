name: Deploy frontend (Vercel)

# Continuous deploy for the web frontend without the Vercel GitHub App
# (this fork's GitHub owner differs from the linked Vercel account).
# Vite inlines VITE_API_BASE at build time, so we build it here from a repo
# variable and deploy the prebuilt static output with a token.
# Requires: variable VITE_API_BASE; secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.

on:
  push:
    branches: [main]
    paths:
      - "packages/web/**"
      - "packages/contracts/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      # Vite reads this from process.env and bakes it into the client bundle.
      VITE_API_BASE: ${{ vars.VITE_API_BASE }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (Vite bakes in VITE_API_BASE)
        run: pnpm --filter @udaan/web build

      - name: Add SPA fallback to the build output
        run: |
          cat > packages/web/dist/vercel.json <<'JSON'
          { "cleanUrls": true, "rewrites": [{ "source": "/(.*)", "destination": "/index.html" }] }
          JSON

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy static output to production
        run: vercel deploy packages/web/dist --prod --yes --force --token="${{ secrets.VERCEL_TOKEN }}"

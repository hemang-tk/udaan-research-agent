name: Deploy frontend (Vercel)

# Continuous deploy for the web frontend without the Vercel GitHub App.
# Builds packages/web and deploys to the Vercel project using a token, so it
# works even though this fork's GitHub owner differs from the Vercel account.
# Requires repo secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.

on:
  push:
    branches: [main]
    paths:
      - "packages/web/**"
      - "packages/contracts/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - "vercel.json"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build (uses vercel.json: pnpm --filter @udaan/web build)
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
